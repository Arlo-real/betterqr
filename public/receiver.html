<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BetterQR - Receive</title>
  <link rel="icon" type="image/png" href="rQR.png">
  <link rel="stylesheet" href="styles/receiver-styles.css">
</head>
<body>
  <div class="container">
    <h1>BetterQR</h1>
    <p class="subtitle">Secure File & Text Sharing - Receive Mode</p>

    <div id="error" class="error"></div>

    <div id="codeInputSection" class="code-input-section">
      <div class="section-title">Step 1: Connect</div>
      <div class="input-group">
        <input type="text" id="codeInput" placeholder="Enter connection code or paste PGP words" />
        <button class="btn" id="connectBtn">Connect</button>
      </div>
      <div id="connectionStatus" class="connection-status" style="display: none;">
        <span>Establishing secure connection...</span>
      </div>
    </div>

    <div id="keyHashDisplay" class="key-hash-display" style="display: none;"></div>

    <div id="messagesSection" class="messages-section" style="display: none;">
      <div class="messages-title">Received Messages</div>
      <div id="messagesList"></div>
    </div>

  </div>

  <footer class="footer">
      <a href="/cookies.html">No cookie banner?</a>
      <span class="separator">•</span>
      <a href="/legal.html">Legal Disclaimer</a>
      <span class="separator">•</span>
      <a href="/privacy.html">Privacy Policy</a>
      <span class="separator">•</span>
      <a href="/faq.html">FAQ</a>
      <span class="separator">•</span>
      <a href="https://github.com/Arlo-real/betterqr" target="_blank">View source code on github</a>
  </footer>

  <script src="receiver-script.js"></script>
</body>
</html>
